name: aogosto_entregador
description: Aplicativo oficial de logística, roteirização inteligente e painel financeiro para os entregadores parceiros da Ao Gosto.
version: 2.0.1+6

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Bibliotecas principais do app
  mobile_scanner: ^7.0.1
  http: ^1.2.2
  intl: ^0.20.2
  syncfusion_flutter_datepicker: ^30.2.4
  html: ^0.15.4
  image_picker: ^1.1.2
  http_parser: ^4.0.2
  mime: ^2.0.0
  package_info_plus: ^8.0.3
  google_fonts: ^6.2.1
  font_awesome_flutter: ^10.7.0
  shared_preferences: ^2.3.2
  flutter_spinkit: ^5.2.1
  url_launcher: ^6.3.2
  permission_handler: ^12.0.1
  path_provider: ^2.1.5
  webview_flutter: ^4.0.0
  flutter_background_service: ^5.0.7
  flutter_background_service_android: ^6.3.1
  flutter_dotenv: ^5.0.2
  firebase_core: any
  cloud_firestore: ^6.1.3
  firebase_storage: 13.1.0
  latlong2: ^0.9.0
  flutter_map: ^6.0.1
  geolocator: ^11.0.0 
  lottie: ^3.1.0 # 👉 Lottie bonitinho aqui

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4 # 👉 Biblioteca de ícones no lugar certo

flutter:
  uses-material-design: true
  assets:
    - shorebird.yaml
    - assets/
    - assets/go-icon.png
    - assets/animations/ 
    - .env

# ==========================================================
# 👉 CONFIGURAÇÃO DO ÍCONE (Apenas UM bloco agora)
# ==========================================================
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true # Habilita para iOS também
  image_path: "assets/go-icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1E1E1E" # Fundo escuro (Slate) pra logo "Go" brilhar
  adaptive_icon_foreground: "assets/go-icon.png"